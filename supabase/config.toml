# إعداد Supabase CLI المحلي — بقية الإعدادات تأخذ القيم الافتراضية
project_id = "salon-saas"

# خدمة السجلات التحليلية المحلية لا تعمل مع colima — غير مطلوبة للتطوير
[analytics]
enabled = false

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://*.localhost:3000"]

# دخول العميلات برمز OTP عبر البريد (محليًا تصل الرسائل إلى Mailpit :54324)
# OTP عبر واتساب يُضاف في مرحلة الواتساب
[auth.email.template.magic_link]
subject = "رمز دخولك"
content_path = "./supabase/templates/otp.html"

[auth.email.template.confirmation]
subject = "رمز تفعيل حسابك"
content_path = "./supabase/templates/otp.html"
